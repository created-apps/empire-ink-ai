<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Empire &amp; Ink</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☽</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    :root{
      --ivory:#F4E9D0; --ivory-dim:#D8C8A2;
      --ink:#0a0604; --ink-soft:#120c06;
      --gold:#C9962B; --gold-bright:#E8B942; --gold-pale:#EED89A;
      --rasa-red:#7A1313; --rasa-red-dk:#560808;
      --rasa-green:#1E3A1F; --rasa-green-dk:#0E2410;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--ink); color:var(--ivory);
      font-family:'Spectral',Georgia,serif;
      min-height:100vh;
    }
    h1,h2,h3,h4{font-family:'Fraunces','Cormorant Garamond',Georgia,serif;font-weight:400;}
    ::selection{background:var(--gold);color:var(--ink);}

    body::before{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:.05;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ─── Top gold accent ─── */
    .gold-line-top{position:fixed;top:0;left:0;right:0;height:1px;z-index:60;
      background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold-bright) 50%,var(--gold) 70%,transparent);}

    /* ─── Auth wrap ─── */
    .auth-wrap{
      min-height:100vh;
      display:grid; grid-template-columns:1.1fr 1fr;
    }
    @media (max-width:900px){ .auth-wrap{grid-template-columns:1fr;} }

    .auth-left{
      position:relative; overflow:hidden;
      padding:60px 48px;
      display:flex; flex-direction:column; justify-content:space-between;
      background:linear-gradient(150deg,var(--rasa-red-dk) 0%, #3a0808 55%, #1a0303 100%);
      min-height:420px;
    }
    .auth-left::before{
      content:'';position:absolute;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg width='60' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 4 Q50 22 50 50 Q50 78 30 96 Q10 78 10 50 Q10 22 30 4Z' fill='none' stroke='%23E8B942' stroke-width='.5' opacity='.09'/%3E%3C/svg%3E");
      pointer-events:none;
    }
    .auth-brand{position:relative;z-index:1;display:flex;align-items:center;gap:14px;}
    .brand-seal{
      width:48px;height:48px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 55%, #8a6312 100%);
      display:grid;place-items:center;
      color:var(--ink); font-family:'Fraunces',serif; font-weight:600; font-size:20px;
      box-shadow:0 0 0 1px rgba(201,150,43,.5), 0 2px 14px rgba(201,150,43,.45);
      flex-shrink:0;
    }
    .auth-brand-text h1{font-family:'Fraunces',serif;font-size:36px;font-style:italic;font-weight:400;color:var(--ivory);margin-bottom:4px;letter-spacing:-.01em;line-height:1;}
    .auth-brand-text h1 em{color:var(--gold);font-style:italic;padding:0 .05em;}
    .auth-brand-text p{font-family:'Spectral',serif;font-style:italic;color:rgba(244,233,208,.55);font-size:14px;margin-top:4px;}

    .welcome-block{position:relative;z-index:1;}
    .welcome-block .rasa-eyebrow{
      font-family:'Fraunces',serif;font-style:italic;font-size:14px;
      color:var(--gold-pale);opacity:.85;margin-bottom:6px;
    }
    .welcome-block h2{
      font-family:'Fraunces',serif;font-style:italic;font-weight:400;
      font-size:clamp(32px,4.5vw,46px);
      color:var(--ivory);line-height:1.05;margin-bottom:12px;
    }
    .welcome-block p{
      font-family:'Spectral',serif;font-size:15px;color:rgba(244,233,208,.65);
      max-width:380px;line-height:1.65;
    }

    .auth-illus{
      position:relative;z-index:1; display:flex; align-items:center; justify-content:center;
      flex:1; padding:24px 0;
    }
    .illus-frame{width:100%;max-width:340px;}
    .illus-frame svg{width:100%;height:auto;display:block;}

    .ornament-rule{display:flex;align-items:center;gap:10px;opacity:.45;position:relative;z-index:1;}
    .ornament-rule .line{height:1px;width:48px;background:linear-gradient(90deg,transparent,var(--gold));}
    .ornament-rule .line.r{background:linear-gradient(90deg,var(--gold),transparent);}
    .ornament-rule .dot{color:var(--gold);font-size:11px;}

    /* ─── Auth right ─── */
    .auth-right{
      padding:60px 48px;
      display:flex; align-items:center; justify-content:center;
      background:var(--ink);
    }
    .auth-form{width:100%;max-width:380px;}
    .auth-form h2{font-family:'Fraunces',serif;font-size:32px;font-weight:400;color:var(--ivory);margin-bottom:4px;}
    .auth-form .sub{font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--ivory-dim);opacity:.65;margin-bottom:28px;}
    .auth-field{margin-bottom:16px;}
    .auth-field label{display:block;font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--gold-pale);opacity:.85;margin-bottom:6px;}
    .input-ornate{
      width:100%; padding:13px 16px;
      background:rgba(20,14,8,.7); border:1px solid rgba(201,150,43,.28);
      border-radius:10px; color:var(--ivory);
      font-family:'Spectral',serif; font-size:14.5px;
      transition:border-color .2s ease, box-shadow .2s ease;
    }
    .input-ornate:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,150,43,.15);}
    .input-ornate::placeholder{color:rgba(216,200,162,.35);font-style:italic;}

    .btn-gold{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      padding:13px 28px; border-radius:999px;
      font-family:'Fraunces',serif; font-size:14px; font-weight:500; letter-spacing:.04em;
      background:linear-gradient(135deg,#b48422,var(--gold) 40%,var(--gold-bright) 70%,var(--gold));
      color:var(--ink); border:none; cursor:pointer;
      box-shadow:0 4px 22px rgba(201,150,43,.32), inset 0 1px 0 rgba(255,255,255,.3);
      transition:transform .15s ease, box-shadow .2s ease;
      text-decoration:none; width:100%;
    }
    .btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(232,185,66,.48), inset 0 1px 0 rgba(255,255,255,.4);}
    .btn-gold:active:not(:disabled){transform:scale(.97);}
    .btn-gold:disabled{opacity:.55;cursor:not-allowed;}

    .auth-bottom{margin-top:22px;text-align:center;font-family:'Spectral',serif;font-size:13.5px;color:var(--ivory-dim);opacity:.7;}
    .auth-bottom a{color:var(--gold-bright);text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(232,185,66,.35);}
    .auth-bottom a:hover{text-decoration-color:var(--gold-bright);}

    .error-msg{
      display:none; padding:11px 14px; border-radius:10px;
      background:rgba(139,26,42,.18); border:1px solid rgba(239,68,68,.4);
      color:#fca5a5; font-family:'Spectral',serif; font-size:13px;
      margin-bottom:16px;
    }
    .error-msg.show{display:block;}

    /* ─── Animations ─── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp .55s cubic-bezier(.22,1,.36,1) forwards;opacity:0;}
    .fade-up-1{animation-delay:.08s;}
    .fade-up-2{animation-delay:.16s;}
    .fade-up-3{animation-delay:.24s;}

    @media (max-width:900px){
      .auth-left,.auth-right{padding:44px 28px;}
      .auth-left{min-height:auto;}
    }
  </style>
</head>

<body>
<div class="gold-line-top"></div>

<section class="auth-wrap">

  <!-- ───────── LEFT: Brand + illustration ───────── -->
  <aside class="auth-left">

    <a href="/" class="auth-brand fade-up" style="text-decoration:none;">
      <div class="brand-seal">E</div>
      <div class="auth-brand-text">
        <h1>Empire <em>&amp;</em> Ink</h1>
        <p>The royal atelier awaits</p>
      </div>
    </a>

    <div class="welcome-block fade-up fade-up-1" style="margin:36px 0 24px;">
      <div class="rasa-eyebrow">śṛṅgāram · welcome back</div>
      <h2>Welcome back</h2>
      <p>Your studio awaits the master's hand. Sign in to resume your residency among the rasas.</p>
    </div>

    <div class="auth-illus fade-up fade-up-2">
      <div class="illus-frame" style="max-width:320px;">
        <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
          <!-- large arch -->
          <path d="M40 300 L40 120 Q40 30 160 30 Q280 30 280 120 L280 300 Z" fill="none" stroke="#EED89A" stroke-width="1.5" opacity=".55"/>
          <path d="M56 300 L56 130 Q56 50 160 50 Q264 50 264 130 L264 300 Z" fill="none" stroke="#EED89A" stroke-width=".9" opacity=".32"/>
          <path d="M72 300 L72 140 Q72 70 160 70 Q248 70 248 140 L248 300 Z" fill="none" stroke="#EED89A" stroke-width=".6" opacity=".2"/>
          <!-- finial -->
          <line x1="160" y1="30" x2="160" y2="10" stroke="#EED89A" stroke-width="1.2" opacity=".7"/>
          <circle cx="160" cy="6" r="4" fill="none" stroke="#EED89A" opacity=".75"/>
          <!-- elephant inside -->
          <g transform="translate(100,180)">
            <ellipse cx="60" cy="40" rx="50" ry="26" fill="#F4E9D0" opacity=".95"/>
            <rect x="40" y="10" width="36" height="28" fill="#7d1a1a" stroke="#EED89A" stroke-width=".6"/>
            <path d="M34 10 L58 -10 L82 10 Z" fill="#a82626" stroke="#EED89A" stroke-width=".6"/>
            <line x1="58" y1="-14" x2="58" y2="-24" stroke="#EED89A" stroke-width="1"/>
            <circle cx="58" cy="-26" r="2.5" fill="#EED89A"/>
            <ellipse cx="92" cy="36" rx="18" ry="16" fill="#F4E9D0"/>
            <path d="M108 38 Q122 44 116 58" stroke="#cfc3a0" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M104 36 l8 6" stroke="#F4E9D0" stroke-width="2" stroke-linecap="round"/>
            <circle cx="100" cy="34" r="1.2" fill="#1a0f06"/>
            <rect x="24" y="58" width="8" height="22" fill="#9e9274"/>
            <rect x="42" y="60" width="7" height="20" fill="#9e9274"/>
            <rect x="70" y="60" width="7" height="20" fill="#9e9274"/>
            <rect x="92" y="58" width="8" height="22" fill="#9e9274"/>
            <path d="M14 34 Q60 18 106 34 L106 50 Q60 42 14 54 Z" fill="#EED89A" opacity=".4"/>
            <circle cx="60" cy="-2" r="5" fill="#EED89A" opacity=".7"/>
          </g>
          <!-- ground -->
          <line x1="40" y1="300" x2="280" y2="300" stroke="#EED89A" stroke-width="1" opacity=".6"/>
          <line x1="40" y1="305" x2="280" y2="305" stroke="#EED89A" stroke-width=".5" opacity=".35"/>
        </svg>
      </div>
    </div>

    <div class="ornament-rule fade-up fade-up-3" style="justify-content:flex-start;margin-top:auto;">
      <span class="line"></span>
      <span class="dot">✦</span>
      <span class="line r"></span>
    </div>
  </aside>

  <!-- ───────── RIGHT: Form ───────── -->
  <div class="auth-right">
    <form id="login-form" class="auth-form fade-up fade-up-1" novalidate>
      <h2>Sign in</h2>
      <p class="sub">Resume your residency in the studio.</p>

      <div id="error-msg" class="error-msg"></div>

      <div class="auth-field">
        <label for="email">Email</label>
        <input class="input-ornate" type="email" id="email" name="email" autocomplete="email" placeholder="you@empire-and-ink.art" required/>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input class="input-ornate" type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
      </div>

      <button type="submit" id="submit-btn" class="btn-gold" style="margin-top:10px;">Enter the Studio</button>

      <div class="ornament-rule" style="margin:22px 0;justify-content:center;">
        <span class="line"></span>
        <span class="dot">✦</span>
        <span class="line r"></span>
      </div>

      <p class="auth-bottom">
        New to the studio? <a href="/register">Create your account</a>
      </p>
    </form>
  </div>

</section>

<script>
  const Auth = {
    getToken: () => localStorage.getItem('ei_token'),
    setSession: (token, userId, email) => {
      localStorage.setItem('ei_token',   token);
      localStorage.setItem('ei_user_id', userId);
      localStorage.setItem('ei_email',   email);
    },
  };

  if (Auth.getToken()) window.location.href = '/studio';

  const form  = document.getElementById('login-form');
  const errEl = document.getElementById('error-msg');
  const btn   = document.getElementById('submit-btn');

  function showErr(msg){ errEl.textContent = msg; errEl.classList.add('show'); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.remove('show');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showErr('Please enter your email and password.'); return; }

    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const resp = await fetch('/api/auth/login', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await resp.json();
      if (!resp.ok) { showErr(data.detail || 'Sign in failed. Please check your credentials.'); return; }
      Auth.setSession(data.access_token, data.user_id, data.email);
      window.location.href = '/studio';
    } catch (err) {
      showErr('Network error. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Enter the Studio';
    }
  });
</script>
</body>
</html>
